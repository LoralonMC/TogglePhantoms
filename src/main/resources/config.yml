# TogglePhantoms Configuration

# PlaceholderAPI placeholders (requires PlaceholderAPI):
#   %togglephantoms_enabled% - Returns "true" or "false"
#   %togglephantoms_status%  - Returns the text from placeholder-enabled/placeholder-disabled below

# Storage type: yaml, sqlite, or mysql
storage:
  type: sqlite

  # MySQL settings (only used if type is mysql)
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: ""

# Messages (MiniMessage format)
# Available placeholders: <player> where applicable
# Leave a message empty ("") to disable it
messages:
  # Self toggle messages
  phantoms-enabled: "<green>Phantom spawning has been <green>enabled</green> for you."
  phantoms-disabled: "<green>Phantom spawning has been <red>disabled</red> for you."

  # Self status messages
  status-enabled: "<gray>Phantom spawning is currently <green>enabled</green> for you."
  status-disabled: "<gray>Phantom spawning is currently <red>disabled</red> for you."

  # Admin messages (use <player> for target player name)
  admin-phantoms-enabled: "<green>Phantom spawning has been <green>enabled</green> for <player>."
  admin-phantoms-disabled: "<green>Phantom spawning has been <red>disabled</red> for <player>."
  admin-status-enabled: "<gray>Phantom spawning is <green>enabled</green> for <player>."
  admin-status-disabled: "<gray>Phantom spawning is <red>disabled</red> for <player>."

  # Notification sent to target player when admin changes their setting
  admin-notify-enabled: "<yellow>An admin has <green>enabled</green> phantom spawning for you."
  admin-notify-disabled: "<yellow>An admin has <red>disabled</red> phantom spawning for you."

  # Error messages
  no-permission: "<red>You don't have permission to use this command."
  player-only: "<red>This command can only be used by players."
  player-not-found: "<red>Player '<player>' has never played on this server."
  unknown-subcommand: "<red>Unknown subcommand. Use: /togglephantoms [reload|status|admin]"
  admin-usage: "<red>Usage: /togglephantoms admin <player> <on|off|toggle|status>"
  invalid-action: "<red>Invalid action. Use: on, off, toggle, or status"

  # Other messages
  reload-success: "<green>TogglePhantoms configuration reloaded."

  # PlaceholderAPI status text
  placeholder-enabled: "Enabled"
  placeholder-disabled: "Disabled"
